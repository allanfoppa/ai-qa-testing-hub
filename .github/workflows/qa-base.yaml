name: Base Template
on:
  workflow_call:
    inputs:
      project_id:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      app_type:
        required: true
        type: string

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Debug dispatch
        run: echo '${{ toJson(github.event) }}'

      - name: Validate Payload
        id: validate
        uses: ./.github/actions/payload-validator
        with:
          qa_contract: ${{ github.event.client_payload.qaContract }}
          repo: ${{ github.event.client_payload.repo }}
          app_root: ${{ github.event.client_payload.app.root }}
          server_port: ${{ github.event.client_payload.server.port }}
          healthcheck: ${{ github.event.client_payload.server.healthcheck }}

      - name: Setup Hub
        uses: ./.github/actions/setup-hub
        with:
          workspace_name: ${{ inputs.workspace_name }}

      - name: Clone Target
        uses: ./.github/actions/clone-target
        with:
          target_id: ${{ inputs.project_id }}
          pat_token: ${{ secrets.QA_HUB_PAT }}
          repo: ${{ steps.validate.outputs.repo }}

      - name: Prepare App
        uses: ./.github/actions/prepare-app
        with:
          target_id: ${{ inputs.project_id }}
          app_root: ${{ steps.validate.outputs.app_root }}

      - name: Install Playwright Browser
        uses: ./.github/actions/install-playwright
        with:
          app_type: ${{ inputs.app_type }}
          workspace_name: ${{ inputs.workspace_name }}

      - name: Run Tests
        uses: ./.github/actions/test-runner
        with:
          workspace_name: ${{ inputs.workspace_name }}
          healthcheck: ${{ steps.validate.outputs.healthcheck }}
          target_id: ${{ inputs.project_id }}
          app_root: ${{ steps.validate.outputs.app_root }}
