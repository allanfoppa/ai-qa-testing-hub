name: Remote QA Trigger

on:
  repository_dispatch:
    types: [run-qa-suite]
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID from apps-registry.json'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup pnpm (Required before setup-node)
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 2. Install Dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. Identify Engine (The Pre-Check)
      - name: Identify Testing Engine
        id: check-engine
        run: |
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"
          ENGINE=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .execution.engine' config/apps-registry.json)
          echo "detected_engine=$ENGINE" >> $GITHUB_OUTPUT
          echo "🚀 Targeted Engine: $ENGINE"

      # 4. Conditional Playwright Setup
      - name: Cache Playwright Binaries
        if: steps.check-engine.outputs.detected_engine == 'playwright'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright
        if: steps.check-engine.outputs.detected_engine == 'playwright' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # 5. Conditional Cypress Setup
      - name: Cache Cypress Binary
        if: steps.check-engine.outputs.detected_engine == 'cypress'
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Cypress
        if: steps.check-engine.outputs.detected_engine == 'cypress' && steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      # 6. Conditional Jest Setup (Optional)
      - name: Prepare Jest Environment
        if: steps.check-engine.outputs.detected_engine == 'jest'
        run: |
          echo "🧪 Preparing Jest environment for $TARGET_ID"
          # Here you could add 'pnpm jest --clearCache' if you run into
          # stale coverage issues, otherwise it's just a log entry.

      # 7. Run the specific suite
      - name: Run Engine Based on Project
        env:
          GH_TOKEN: ${{ secrets.QA_HUB_PAT }}
        run: |
          # 1. Capture ID
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"

          # 2. Extract Metadata (USING THE NEW NESTED PATHS)
          # Note the .app.rootPath and .app.repo etc.
          ROOT_PATH=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.metadata.id==$ID) | .app.rootPath' config/apps-registry.json)
          REPO=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.metadata.id==$ID) | .app.repo' config/apps-registry.json)
          PORT=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.metadata.id==$ID) | .app.port' config/apps-registry.json)

          PREPARE=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.metadata.id==$ID) | .execution.prepare' config/apps-registry.json)
          INIT_APP=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.metadata.id==$ID) | .execution.initApp' config/apps-registry.json)
          COMMAND=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.metadata.id==$ID) | .execution.command' config/apps-registry.json)

          # 3. Clone
          if [ "$REPO" != "null" ]; then
            echo "🚀 Cloning $REPO into apps/$TARGET_ID"
            gh repo clone "$REPO" "apps/$TARGET_ID"
          fi

          # 4. Set Absolute Target Directory
          TARGET_DIR="$GITHUB_WORKSPACE/apps/$TARGET_ID/$ROOT_PATH"

          # 5. Execute in Target Dir
          if [ -d "$TARGET_DIR" ]; then
            cd "$TARGET_DIR"
            echo "📂 Working in $(pwd)"

            if [ "$PREPARE" != "null" ]; then
              eval "$PREPARE"
            fi

            if [ "$INIT_APP" != "null" ]; then
              eval "$INIT_APP" > app.log 2>&1 &
              npx wait-on "http://localhost:$PORT" -t 60000 || (cat app.log && exit 1)
            fi
          else
            echo "❌ ERROR: Target directory $TARGET_DIR does not exist!"
            # Debug: show what actually exists
            echo "🔍 Contents of apps/$TARGET_ID:"
            ls -R "$GITHUB_WORKSPACE/apps/$TARGET_ID"
            exit 1
          fi

          # 6. Run Hub Tests
          cd "$GITHUB_WORKSPACE"
          eval "$COMMAND"
