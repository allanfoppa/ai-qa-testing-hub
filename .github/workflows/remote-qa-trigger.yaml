name: Remote QA Trigger

on:
  repository_dispatch:
    types: [run-qa-suite]
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID from apps-registry.json'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SKIP_PREFLIGHT_CHECK: true
      GH_TOKEN: ${{ secrets.QA_HUB_PAT }}
      NODE_OPTIONS: "--max-old-space-size=4096" # prevents OOM in CI
    steps:
      - uses: actions/checkout@v4

      # 1. Setup pnpm (Required before setup-node)
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 2. Install Dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. Identify Engine (The Pre-Check)
      - name: Identify Testing Engine
        id: check-engine
        run: |
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"
          ENGINE=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .execution.engine' config/apps-registry.json)
          echo "detected_engine=$ENGINE" >> $GITHUB_OUTPUT
          echo "🚀 Targeted Engine: $ENGINE"

      # 4. Conditional Playwright Setup
      - name: Cache Playwright Binaries
        if: steps.check-engine.outputs.detected_engine == 'playwright'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright
        if: steps.check-engine.outputs.detected_engine == 'playwright' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # 5. Conditional Cypress Setup
      - name: Cache Cypress Binary
        if: steps.check-engine.outputs.detected_engine == 'cypress'
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Cypress
        if: steps.check-engine.outputs.detected_engine == 'cypress' && steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      # 6. Conditional Jest Setup (Optional)
      - name: Prepare Jest Environment
        if: steps.check-engine.outputs.detected_engine == 'jest'
        run: |
          echo "🧪 Preparing Jest environment for $TARGET_ID"
          # Here you could add 'pnpm jest --clearCache' if you run into
          # stale coverage issues, otherwise it's just a log entry.

      # 7. Run the specific suite
      - name: Run Engine Based on Project
        run: |
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"

          # Extract Metadata
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" config/apps-registry.json)
          REPO=$(jq -r "$QUERY | .app.repo" config/apps-registry.json)
          TYPE=$(jq -r "$QUERY | .metadata.type" config/apps-registry.json)

          PREPARE=$(jq -r "$QUERY | .execution.prepare" config/apps-registry.json)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" config/apps-registry.json)
          COMMAND=$(jq -r "$QUERY | .execution.command" config/apps-registry.json)

          # Clone
          if [ "$REPO" != "null" ]; then
            gh repo clone "$REPO" "apps/$TARGET_ID"
          fi

          # Dependency Logic: Build Backend sibling if Frontend is targeted
          if [ "$TYPE" == "frontend" ] && [ -d "$GITHUB_WORKSPACE/apps/$TARGET_ID/backend" ]; then
            echo "🛡️ Building Backend Dependency..."
            cd "$GITHUB_WORKSPACE/apps/$TARGET_ID/backend"
            pnpm install && pnpm run build
          fi

          # Target Execution
          TARGET_DIR="$GITHUB_WORKSPACE/apps/$TARGET_ID/$ROOT_PATH"
          if [ -d "$TARGET_DIR" ]; then
            cd "$TARGET_DIR"

            echo "🛠️ Running Prepare..."
            eval "$PREPARE"

            if [ "$INIT_APP" != "null" ]; then
              echo "⚡ Starting App with: $INIT_APP"
              # We execute exactly what is in the JSON.
              # No more extra wait-on here, it must be inside INIT_APP.
              eval "$INIT_APP" > app.log 2>&1 &

              # Wait for the background process to settle
              sleep 5

              # If wait-on was in the string, it will hold the process here.
              # If not, we check if the process is still alive.
              if ! ps -p $! > /dev/null; then
                echo "❌ App failed to start! Logs:"
                cat app.log
                exit 1
              fi
            fi
          fi

          # Final Test Execution
          cd "$GITHUB_WORKSPACE"
          echo "🚀 Running Test Command: $COMMAND"
          eval "$COMMAND"
