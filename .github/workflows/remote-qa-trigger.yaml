name: Remote QA Trigger

on:
  repository_dispatch:
    types: [run-qa-suite]
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID from apps-registry.json'
        required: true

env:
  SKIP_PREFLIGHT_CHECK: true
  # GitHub will move from Node.js 20 to 24 soon
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.QA_HUB_PAT }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup pnpm and then Node.js
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 2. Install Dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. Identify Engine (The Pre-Check)
      - name: Identify Testing Engine
        id: check-engine
        run: |
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"
          ENGINE=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .execution.engine' config/apps-registry.json)
          echo "detected_engine=$ENGINE" >> $GITHUB_OUTPUT
          echo "🚀 Targeted Engine: $ENGINE"

      # 4. Conditional Playwright Setup
      - name: Cache Playwright Binaries
        if: steps.check-engine.outputs.detected_engine == 'playwright'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright
        if: steps.check-engine.outputs.detected_engine == 'playwright' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # 5. Conditional Cypress Setup
      - name: Cache Cypress Binary
        if: steps.check-engine.outputs.detected_engine == 'cypress'
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Cypress
        if: steps.check-engine.outputs.detected_engine == 'cypress' && steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      # 6. Conditional Jest Setup (Optional)
      - name: Prepare Jest Environment
        if: steps.check-engine.outputs.detected_engine == 'jest'
        run: |
          echo "🧪 Preparing Jest environment for $TARGET_ID"
          # Here you could add 'pnpm jest --clearCache' if you run into
          # stale coverage issues, otherwise it's just a log entry.

      # 7. Orchestrate and Run the Suite
      - name: 🚀 Prepare and Execute Suite
        run: |
          # --- 1. SETUP CONTEXT ---
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"
          HUB_ROOT=$GITHUB_WORKSPACE
          REGISTRY=$HUB_ROOT/config/apps-registry.json
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"

          # Extract Metadata from JSON
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" config/apps-registry.json)
          REPO=$(jq -r "$QUERY | .app.repo" config/apps-registry.json)
          PREPARE=$(jq -r "$QUERY | .execution.prepare" config/apps-registry.json)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" config/apps-registry.json)
          COMMAND=$(jq -r "$QUERY | .execution.command" config/apps-registry.json)

          # --- 2. CLONE & ISOLATE ---
          if [ "$REPO" != "null" ]; then
            echo "📂 Cloning $REPO..."
            gh repo clone "$REPO" "apps/$TARGET_ID"
          fi

          # Move into the sub-app folder to install ITS specific dependencies
          if [ -d "apps/$TARGET_ID/$ROOT_PATH" ]; then
            cd "apps/$TARGET_ID/$ROOT_PATH"
            echo "📦 Installing Sub-App Dependencies (Isolated)..."
            pnpm install --no-frozen-lockfile

            if [ "$PREPARE" != "null" ]; then
              echo "🛠️ Running Prepare: $PREPARE"
              eval "$PREPARE"
            fi

            # --- THE START & WAIT LOGIC ---
            if [ "$INIT_APP" != "null" ]; then
               echo "⚡ Starting App in background..."
               # Everything before the '&'
               START_CMD=$(echo "$INIT_APP" | cut -d'&' -f1)
               eval "$START_CMD" > app.log 2>&1 &

               # Everything after the '&'
               WAIT_CMD=$(echo "$INIT_APP" | cut -d'&' -f2-)

               if [[ "$WAIT_CMD" == *"wait-on"* ]]; then
                  echo "⏳ Executing wait-on: $WAIT_CMD"
                  eval "$WAIT_CMD"

                  # Check if wait-on actually succeeded
                  if [ $? -ne 0 ]; then
                    echo "❌ App failed to start or port timed out! App Logs:"
                    cat app.log
                    exit 1
                  fi
               else
                  echo "⏳ No wait command found in registry, sleeping 15s..."
                  sleep 15
               fi
            fi
          fi

          # --- 3. FINAL EXECUTION ---
          cd $HUB_ROOT
          echo "🧪 Executing Test Suite for: $TARGET_ID"
          echo "💻 Command: $COMMAND"

          eval "$COMMAND"
