name: Remote QA Trigger

on:
  repository_dispatch:
    types: [run-qa-suite]
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID from apps-registry.json'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup pnpm (Required before setup-node)
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 2. Install Dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. Identify Engine (The Pre-Check)
      - name: Identify Testing Engine
        id: check-engine
        run: |
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"
          ENGINE=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .engine' config/apps-registry.json)
          echo "detected_engine=$ENGINE" >> $GITHUB_OUTPUT
          echo "🚀 Targeted Engine: $ENGINE"

      # 4. Conditional Playwright Setup
      - name: Cache Playwright Binaries
        if: steps.check-engine.outputs.detected_engine == 'playwright'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright
        if: steps.check-engine.outputs.detected_engine == 'playwright' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # 5. Conditional Cypress Setup
      - name: Cache Cypress Binary
        if: steps.check-engine.outputs.detected_engine == 'cypress'
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Cypress
        if: steps.check-engine.outputs.detected_engine == 'cypress' && steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm exec cypress install

      # 6. Conditional Jest Setup (Optional)
      - name: Prepare Jest Environment
        if: steps.check-engine.outputs.detected_engine == 'jest'
        run: |
          echo "🧪 Preparing Jest environment for $TARGET_ID"
          # Here you could add 'pnpm jest --clearCache' if you run into
          # stale coverage issues, otherwise it's just a log entry.

      # 7. Run the specific suite
      - name: Run Engine Based on Project
        env:
          GH_TOKEN: ${{ secrets.QA_HUB_PAT }}
        run: |
          # 1. Get IDs
          TARGET_ID="${{ github.event.client_payload.project_id || github.event.inputs.project_id }}"

          # 2. Extract Strategy
          ROOT_PATH=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .rootPath' config/apps-registry.json)
          INIT_APP=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .initApp' config/apps-registry.json)
          REPO=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .repo' config/apps-registry.json)
          PREPARE=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .prepare' config/apps-registry.json)
          COMMAND=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .command' config/apps-registry.json)
          PORT=$(jq -r --arg ID "$TARGET_ID" '.projects[] | select(.id==$ID) | .port' config/apps-registry.json)

          # 3. Clone & Prepare
          if [ "$REPO" != "null" ] && [ -n "$REPO" ]; then
            echo "Cloning external repository: $REPO"
            gh repo clone $REPO apps/$TARGET_ID

            if [ "$PREPARE" != "null" ]; then
              echo "Running preparation: $PREPARE"
              # Execute in a subshell to not lose 'pwd'
              ( eval $PREPARE )
            fi
          fi

          # 4. Final Execution
          export PROJECT_ROOT_PATH=$ROOT_PATH
          export PROJECT_INIT_ENV=$INIT_APP
          export PROJECT_ID_ENV=$TARGET_ID
          export PROJECT_PORT_ENV=$PORT

          if [ "$INIT_APP" != "null" ] && [ -n "$INIT_APP" ]; then
            echo "Starting $TARGET_ID on port $PORT..."

            # Start the app in the background and pipe logs to a file
            cd apps/$TARGET_ID/$ROOT_PATH && eval $INIT_APP > app.log 2>&1 &

            # Wait for the port to be active (timeout 60s)
            npx wait-on http://localhost:$PORT -t 60000
            echo "App is UP!"
          fi

          echo "Executing strategy from root: $(pwd)"
          eval $COMMAND

          # 5. Cleanup (Kill the app if it was started)
          if [ -n "$PORT" ]; then
            echo "Cleaning up port $PORT..."
            fuser -k $PORT/tcp || true
          fi
