name: QA - Jest Engines
on:
  repository_dispatch:
    types: [run-jest-suite]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Isolate and Run Jest
        env:
          TARGET_ID: ${{ github.event.client_payload.project_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="config/apps-registry.json"
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"

          # 1. Extract Metadata from Registry
          REPO=$(jq -r "$QUERY | .app.repo" $REGISTRY)
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" $REGISTRY)
          PREPARE_CMD=$(jq -r "$QUERY | .execution.prepare" $REGISTRY)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" $REGISTRY)

          # 2. Export Global Environment Variables
          export CI=true
          export PORT=$(jq -r "$QUERY | .app.port" $REGISTRY)
          export WORKSPACE_NAME=$(jq -r "$QUERY | .metadata.workspace_name" $REGISTRY)
          export NODE_OPTIONS=--openssl-legacy-provider

          echo "🚀 Starting Suite: $WORKSPACE_NAME"

          # 3. Install Hub + Suite (Filter for specific workspace)
          pnpm install --filter . --filter "$WORKSPACE_NAME" --no-frozen-lockfile

          # 4. Clone and Build Target App
          gh repo clone "$REPO" "apps/$TARGET_ID"
          cd "apps/$TARGET_ID/$ROOT_PATH"

          echo "🛠️ Standalone Install for $TARGET_ID..."
          # This creates the local node_modules with all the binaries (nest, vite, etc.)
          pnpm install --no-frozen-lockfile --ignore-workspace

          echo "🏗️ Running Prepare Script: $PREPARE_CMD"
          # We check if PREPARE_CMD exists.
          # We use pnpm --ignore-workspace run so pnpm handles the isolation,
          # but the underlying tool (Vite/Nest) receives NO extra flags.
          if [ -n "$PREPARE_CMD" ] && [ "$PREPARE_CMD" != "null" ]; then
            pnpm --ignore-workspace run "$PREPARE_CMD"
          fi

          # 5. Define the Universal Test Command
          UNIVERSAL_TEST_CMD="pnpm --filter $WORKSPACE_NAME test"

          # 6. Start Lifecycle: Start -> Wait -> Test -> Stop
          echo "⚡ Executing Lifecycle: $INIT_APP"
          eval "$INIT_APP '$UNIVERSAL_TEST_CMD'"
