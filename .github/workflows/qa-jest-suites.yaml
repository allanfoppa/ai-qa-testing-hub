name: QA - Jest Engines
on:
  repository_dispatch:
    types: [run-jest-suite]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Isolate and Run Jest
        env:
          TARGET_ID: ${{ github.event.client_payload.project_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="config/apps-registry.json"
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"

          # 1. Extract ALL necessary data
          REPO=$(jq -r "$QUERY | .app.repo" $REGISTRY)
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" $REGISTRY)
          PORT=$(jq -r "$QUERY | .app.port" $REGISTRY)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" $REGISTRY)
          WORKSPACE_NAME=$(jq -r "$QUERY | .metadata.workspace_name" $REGISTRY)

          echo "🚀 Processing Jest Suite: $TARGET_ID"

          # 2. Install Hub + Suite (Filter avoids installing unrelated deps)
          pnpm install --filter . --filter "$WORKSPACE_NAME" --no-frozen-lockfile

          # 3. Clone and Setup Target App
          gh repo clone "$REPO" "apps/$TARGET_ID"
          cd "apps/$TARGET_ID/$ROOT_PATH"

          # Standalone install to ensure binaries (nest, vite, etc.) are local
          # We use --ignore-workspace so it doesn't try to link to the Hub's root
          pnpm install --no-frozen-lockfile --ignore-workspace

          # 4. Start logic with Dynamic Port & CI Flags
          START_PART=$(echo "$START_PART" | cut -d'&' -f1) # Fixed: use logic from registry
          # If the registry has '&', we split. If not, we just use the whole string.
          START_CMD=$(echo "$INIT_APP" | awk -F'&' '{print $1}')
          WAIT_CMD=$(echo "$INIT_APP" | awk -F'&' '{print $2}')

          # Standard CI Exports
          export CI=true
          export BROWSER=none
          export SKIP_PREFLIGHT_CHECK=true
          export PORT=$PORT
          export HOST=127.0.0.1          # Many frameworks use this
          export IP=127.0.0.1            # Some older ones use this
          export NODE_OPTIONS=--openssl-legacy-provider

          echo "⚡ Starting $TARGET_ID on Port $PORT..."
          eval "$START_CMD" > app.log 2>&1 &

          echo "⏳ Waiting for port..."
          # If WAIT_CMD is empty (no '&' in registry), we use a default npx wait-on
          if [ -z "$WAIT_CMD" ]; then
            npx wait-on http://127.0.0.1:$PORT -t 90000
          else
            eval "$WAIT_CMD"
          fi || {
            echo "❌ TIMEOUT: Showing logs..."
            cat app.log
            exit 1
          }

          # 5. Execute tests
          cd $GITHUB_WORKSPACE
          pnpm --filter "$WORKSPACE_NAME" test
