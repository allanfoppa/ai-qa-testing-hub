name: QA - AI Text Summarizer App Backend
on:
  repository_dispatch:
    types: [run-ai-text-summarizer-app-backend-tests]

jobs:
  call-template:
    uses: ./.github/workflows/qa-base.yaml
    with:
      project_id: "ai-text-summarizer-app-backend"
      # The workspace name is the name of the package in the monorepo
      workspace_name: "@hub/ai-text-summarizer-app-backend"
      app_type: "backend"
    secrets: inherit
