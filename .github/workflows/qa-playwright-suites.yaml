name: QA - Playwright Engines
on:
  repository_dispatch:
    types: [run-playwright-suite]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Playwright Binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers & Deps
        run: npx playwright install --with-deps chromium

      - name: Isolate and Run Playwright
        env:
          TARGET_ID: ${{ github.event.client_payload.project_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="config/apps-registry.json"
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"

          REPO=$(jq -r "$QUERY | .app.repo" $REGISTRY)
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" $REGISTRY)
          PREPARE_CMD=$(jq -r "$QUERY | .execution.prepare" $REGISTRY)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" $REGISTRY)

          export CI=true
          export PORT=$(jq -r "$QUERY | .app.port" $REGISTRY)
          export WORKSPACE_NAME=$(jq -r "$QUERY | .metadata.workspace_name" $REGISTRY)
          export NODE_OPTIONS=--openssl-legacy-provider

          pnpm install --filter . --filter "$WORKSPACE_NAME" --no-frozen-lockfile

          gh repo clone "$REPO" "apps/$TARGET_ID"
          cd "apps/$TARGET_ID/$ROOT_PATH"

          eval "$PREPARE_CMD" --ignore-workspace

          TEST_CMD="pnpm --filter $WORKSPACE_NAME test"

          eval "$INIT_APP '$TEST_CMD'"
