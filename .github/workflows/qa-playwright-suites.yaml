name: QA - Playwright Engines
on:
  repository_dispatch:
    types: [run-playwright-suite]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Isolate and Run Playwright
        env:
          TARGET_ID: ${{ github.event.client_payload.project_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="config/apps-registry.json"
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"

          REPO=$(jq -r "$QUERY | .app.repo" $REGISTRY)
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" $REGISTRY)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" $REGISTRY)
          WORKSPACE_NAME=$(jq -r "$QUERY | .metadata.workspace_name" $REGISTRY)

          echo "Processing Playwright Suite: $TARGET_ID"

          # 1. Install Workspace Dependencies
          pnpm install --filter . --filter "$WORKSPACE_NAME" --no-frozen-lockfile

          # 2. INSTALL PLAYWRIGHT BROWSERS
          # This installs ONLY the browsers needed for this specific workspace
          pnpm --filter "$WORKSPACE_NAME" exec playwright install --with-deps chromium

          # 3. Clone and Start the Target App
          gh repo clone "$REPO" "apps/$TARGET_ID"
          cd "apps/$TARGET_ID/$ROOT_PATH"
          pnpm install --no-frozen-lockfile

          # Start & Wait logic
          START_CMD=$(echo "$INIT_APP" | cut -d'&' -f1)
          WAIT_CMD=$(echo "$INIT_APP" | cut -d'&' -f2-)
          eval "$START_CMD" > app.log 2>&1 &
          eval "$WAIT_CMD"

          # 4. Execute the Playwright test
          cd $GITHUB_WORKSPACE
          pnpm --filter "$WORKSPACE_NAME" test
