name: QA - Playwright Engines
on:
  repository_dispatch:
    types: [run-playwright-suite]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Playwright Binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # This only runs if the cache misses, OR to ensure system deps are present
      - name: Install Playwright Browsers & Deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # If cache hits, we still need system deps (libs like libgbm, etc.)
      - name: Install Playwright System Dependencies Only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Isolate and Run Playwright
        env:
          TARGET_ID: ${{ github.event.client_payload.project_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="config/apps-registry.json"
          QUERY=".projects[] | select(.metadata.id==\"$TARGET_ID\")"

          # 1. Extract ALL necessary data from Registry
          REPO=$(jq -r "$QUERY | .app.repo" $REGISTRY)
          ROOT_PATH=$(jq -r "$QUERY | .app.rootPath" $REGISTRY)
          PORT=$(jq -r "$QUERY | .app.port" $REGISTRY)
          INIT_APP=$(jq -r "$QUERY | .execution.initApp" $REGISTRY)
          WORKSPACE_NAME=$(jq -r "$QUERY | .metadata.workspace_name" $REGISTRY)

          # 2. Install Hub + Suite
          pnpm install --filter . --filter "$WORKSPACE_NAME" --no-frozen-lockfile

          # 3. Clone and Setup Target App
          gh repo clone "$REPO" "apps/$TARGET_ID"
          cd "apps/$TARGET_ID/$ROOT_PATH"

          # Standalone install to ensure binaries like react-scripts are local
          pnpm install --no-frozen-lockfile --ignore-workspace

          # 4. Start logic with Dynamic Port & CI Flags
          START_PART=$(echo "$INIT_APP" | cut -d'&' -f1)
          WAIT_PART=$(echo "$INIT_APP" | cut -d'&' -f2-)

          echo "🚀 Starting $TARGET_ID on Port $PORT..."

          # Combine CI flags + Registry Port + Start Command
          export CI=true
          export BROWSER=none
          export SKIP_PREFLIGHT_CHECK=true
          export PORT=$PORT
          export HOST=127.0.0.1          # Many frameworks use this
          export IP=127.0.0.1            # Some older ones use this
          export NODE_OPTIONS=--openssl-legacy-provider

          eval "$START_PART" > app.log 2>&1 &

          echo "⏳ Waiting for $WAIT_PART"
          eval "$WAIT_PART" || {
            echo "❌ TIMEOUT: Showing logs..."
            cat app.log
            exit 1
          }

          # 5. Execute tests
          cd $GITHUB_WORKSPACE
          pnpm --filter "$WORKSPACE_NAME" exec playwright test
