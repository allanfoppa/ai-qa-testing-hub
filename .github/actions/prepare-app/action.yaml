name: "Prepare App"
description: "Installs app dependencies and runs build script"
inputs:
  target_id:
    required: true
  root_path:
    required: true
  build:
    required: true
runs:
  using: "composite"
  steps:
    - name: App Install
      shell: bash
      working-directory: apps/${{ inputs.target_id }}/${{ inputs.root_path }}
      run: |
        set -euo pipefail

        echo "📦 Installing dependencies..."
        echo "📁 Current dir: $(pwd)"
        ls -la

        if [ -f "pnpm-lock.yaml" ]; then
          pnpm install --no-frozen-lockfile --shamefully-hoist --ignore-workspace
        elif [ -f "yarn.lock" ]; then
          yarn install --no-immutable
        elif [ -f "package-lock.json" ]; then
          npm ci
        else
          echo "❌ No lockfile found"
          exit 1
        fi

    - name: App Build
      shell: bash
      working-directory: apps/${{ inputs.target_id }}/${{ inputs.root_path }}
      run: |
        set -euo pipefail

        BUILD_CMD="${{ github.event.client_payload.build }}"

        if [ -z "$BUILD_CMD" ] || [ "$BUILD_CMD" = "null" ]; then
          echo "❌ build command is required"
          exit 1
        fi

        echo "🏗️ Running build: $BUILD_CMD"
        eval "$BUILD_CMD"
