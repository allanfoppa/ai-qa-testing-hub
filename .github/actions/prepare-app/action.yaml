name: "Prepare App"
description: "Installs app dependencies and runs build script"

runs:
  using: "composite"
  steps:
    - name: App Install
      shell: bash
      run: |
        echo "📦 Installing dependencies..."

        if [ -f "pnpm-lock.yaml" ]; then
          pnpm install --no-frozen-lockfile --shamefully-hoist --ignore-workspace
        elif [ -f "yarn.lock" ]; then
          yarn install --no-immutable
        elif [ -f "package-lock.json" ]; then
          npm ci
        else
          echo "❌ No lockfile found"
          exit 1
        fi

    - name: App Build
      shell: bash
      run: |
        QA_BUILD=$(node -e "console.log(require('./package.json').qa.build)") || true

        if [ -z "$QA_BUILD" ]; then
          echo "❌ qa.build is required by QA Hub contract"
          exit 1
        fi

        echo "🏗️ Running QA build: $QA_BUILD"
        eval "$QA_BUILD"
