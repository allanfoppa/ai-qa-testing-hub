name: "Prepare App"
description: "Installs app dependencies and runs build script"
inputs:
  target_id:
    required: true
  root_path:
    required: false
    default: "."
  build_script:
    required: false
  port:
    required: false
    default: "3000"
runs:
  using: "composite"
  steps:
    - name: App Install and Build
      shell: bash
      run: |
        # Detect package manager
        if [ -f "pnpm-lock.yaml" ]; then
          PM="pnpm"
        elif [ -f "yarn.lock" ]; then
          PM="yarn"
        else
          PM="npm"
        fi

        echo "Detected package manager: $PM"

        # Install dependencies
        if [ "$PM" = "pnpm" ]; then
          pnpm install --no-frozen-lockfile --shamefully-hoist
        elif [ "$PM" = "yarn" ]; then
          yarn install --no-immutable
        else
          npm install
        fi

        # Detect if build script exists
        HAS_BUILD=$(node -e "try {const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)} catch(e){process.exit(1)}")

        if [ "$HAS_BUILD" = "0" ]; then
          echo "Running build..."

          if [ "$PM" = "pnpm" ]; then
            pnpm run build
          elif [ "$PM" = "yarn" ]; then
            yarn build
          else
            npm run build
          fi
        else
          echo "ℹNo build script found, skipping..."
        fi
