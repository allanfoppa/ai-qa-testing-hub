name: "Prepare App"
description: "Installs app dependencies and runs build script"
inputs:
  target_id:
    required: true
  root_path:
    required: false
    default: "."
  build_script:
    required: false
  port:
    required: false
    default: "3000"
runs:
  using: "composite"
  steps:
    - name: App Install and Build
      shell: bash
      run: |
        set -euo pipefail

        export NODE_OPTIONS="--openssl-legacy-provider"
        export SKIP_PREFLIGHT_CHECK=true
        export PORT="${{ inputs.port }}"

        SAFE_ROOT_PATH="${{ inputs.root_path }}"
        if [ -z "$SAFE_ROOT_PATH" ] || [ "$SAFE_ROOT_PATH" = "null" ]; then
          SAFE_ROOT_PATH="."
        fi

        cd "apps/${{ inputs.target_id }}/$SAFE_ROOT_PATH"

        echo "📁 Working dir: $(pwd)"
        ls -la

        # Detect package manager
        if [ -f "pnpm-lock.yaml" ]; then
          PM="pnpm"
        elif [ -f "yarn.lock" ]; then
          PM="yarn"
        else
          PM="npm"
        fi

        echo "📦 Detected package manager: $PM"

        # 🚨 Prevent pnpm workspace pollution
        export PNPM_WORKSPACE_ROOT=.

        # Install dependencies
        if [ "$PM" = "pnpm" ]; then
          pnpm install --no-frozen-lockfile --shamefully-hoist --ignore-workspace || {
            echo "⚠️ pnpm failed, falling back to npm..."
            npm install
            PM="npm"
          }
        elif [ "$PM" = "yarn" ]; then
          yarn install --no-immutable
        else
          npm install
        fi

        # Detect build script
        if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)"; then
          echo "🏗️ Running build..."

          if [ "$PM" = "pnpm" ]; then
            pnpm run build
          elif [ "$PM" = "yarn" ]; then
            yarn build
          else
            npm run build
          fi
        else
          echo "ℹ️ No build script found, skipping build"
        fi
