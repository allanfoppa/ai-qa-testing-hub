name: "Prepare App"
description: "Installs app dependencies and runs build script"
inputs:
  target_id:
    required: true
  app_root:
    required: true
  cmd_build:
    required: true
runs:
  using: "composite"
  steps:
    - name: App Install
      shell: bash
      working-directory: apps/${{ inputs.target_id }}/${{ inputs.app_root }}
      run: |
        set -euo pipefail

        echo "📦 Installing dependencies..."
        echo "📁 Current dir: $(pwd)"
        ls -la

        if [ -f "pnpm-lock.yaml" ]; then
          pnpm install --no-frozen-lockfile --shamefully-hoist --ignore-workspace
        elif [ -f "yarn.lock" ]; then
          yarn install --no-immutable
        elif [ -f "package-lock.json" ]; then
          npm ci
        else
          echo "❌ No lockfile found"
          exit 1
        fi

    - name: App Build
      shell: bash
      working-directory: apps/${{ inputs.target_id }}/${{ inputs.app_root }}
      run: |
        set -euo pipefail

        echo "🏗️ Running build: ${{ inputs.cmd_build }}"
        bash -c "${{ inputs.cmd_build }}"
