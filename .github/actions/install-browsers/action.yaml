name: "Install Playwright Browsers"
description: "Installs Playwright browsers for frontend suites. Skipped for backend."
inputs:
  app_type:
    required: true
    description: "Type of application: 'frontend' or 'backend'"
  workspace_name:
    required: true
    description: "The hub pnpm workspace to scope the playwright install"
runs:
  using: "composite"
  steps:
    - name: Install Playwright Browsers
      if: inputs.app_type == 'frontend'
      shell: bash
      run: |
        pnpm --filter ${{ inputs.workspace_name }} exec playwright install --with-deps chromium
