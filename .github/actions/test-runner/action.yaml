name: "Test Runner"
description: "Executes standard tests using start-server-and-test"
inputs:
  target_id:
    required: true
  root_path:
    required: false
    default: "."
  start_command:
    required: true
  wait_condition:
    required: true
  workspace_name:
    required: true
  port:
    required: false
    default: "3000"
runs:
  using: "composite"
  steps:
    - name: Execution
      shell: bash
      run: |
        set -euo pipefail

        export NODE_OPTIONS="--openssl-legacy-provider"
        export SKIP_PREFLIGHT_CHECK=true
        export PORT="${{ inputs.port }}"

        SAFE_ROOT_PATH="${{ inputs.root_path }}"
        if [ -z "$SAFE_ROOT_PATH" ] || [ "$SAFE_ROOT_PATH" = "null" ]; then
          SAFE_ROOT_PATH="."
        fi

        cd "apps/${{ inputs.target_id }}/$SAFE_ROOT_PATH"

        echo "📁 Working dir: $(pwd)"
        ls -la

        # Detect package manager
        if [ -f "pnpm-lock.yaml" ]; then
          PM="pnpm"
        elif [ -f "yarn.lock" ]; then
          PM="yarn"
        else
          PM="npm"
        fi

        echo "🚀 Detected package manager: $PM"

        # 🚨 Prevent pnpm workspace pollution
        export PNPM_WORKSPACE_ROOT=.

        # Detect best start script
        START_SCRIPT=$(node -e "
          const p = require('./package.json');
          const scripts = p.scripts || {};
          if (scripts.start) console.log('start');
          else if (scripts['start:dev']) console.log('start:dev');
          else if (scripts.dev) console.log('dev');
          else if (scripts.serve) console.log('serve');
          else process.exit(1);
        ") || {
          echo "❌ No valid start script found (start, start:dev, dev, serve)"
          exit 1
        }

        echo "⚡ Using start script: $START_SCRIPT"

        # Build start command dynamically
        if [ "$PM" = "pnpm" ]; then
          START_CMD="pnpm run $START_SCRIPT"
        elif [ "$PM" = "yarn" ]; then
          START_CMD="yarn $START_SCRIPT"
        else
          START_CMD="npm run $START_SCRIPT"
        fi

        # Build test command dynamically
        if [ "$PM" = "pnpm" ]; then
          TEST_CMD="pnpm --filter ${{ inputs.workspace_name }} test"
        elif [ "$PM" = "yarn" ]; then
          TEST_CMD="yarn workspace ${{ inputs.workspace_name }} test"
        else
          TEST_CMD="npm run test --workspace=${{ inputs.workspace_name }}"
        fi

        echo "🧪 Test command: $TEST_CMD"

        npx start-server-and-test \
          "$START_CMD" \
          "${{ inputs.wait_condition }}" \
          "$TEST_CMD"
