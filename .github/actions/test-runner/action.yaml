name: "Test Runner"
description: "Executes standard tests using start-server-and-test"
inputs:
  target_id:
    required: true
  root_path:
    required: false
    default: "."
  start_command:
    required: true
  wait_condition:
    required: true
  workspace_name:
    required: true
  port:
    required: false
    default: "3000"
runs:
  using: "composite"
  steps:
    - name: Execution
      shell: bash
      run: |
        # Detect package manager again
        if [ -f "pnpm-lock.yaml" ]; then
          PM="pnpm"
        elif [ -f "yarn.lock" ]; then
          PM="yarn"
        else
          PM="npm"
        fi

        echo "🚀 Using package manager: $PM"

        # Build test command dynamically
        if [ "$PM" = "pnpm" ]; then
          TEST_CMD="pnpm --filter ${{ inputs.workspace_name }} test"
        elif [ "$PM" = "yarn" ]; then
          TEST_CMD="yarn workspace ${{ inputs.workspace_name }} test"
        else
          TEST_CMD="npm run test --workspace=${{ inputs.workspace_name }}"
        fi

        npx start-server-and-test \
          "${{ inputs.start_command }}" \
          "${{ inputs.wait_condition }}" \
          "$TEST_CMD"
