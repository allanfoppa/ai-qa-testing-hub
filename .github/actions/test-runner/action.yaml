name: "Test Runner"
description: "Executes standard tests using start-server-and-test"
inputs:
  workspace_name:
    required: true
  cmd_start:
    required: true
  healthcheck:
    required: true
runs:
  using: "composite"
  steps:
    - name: Execution
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::🧪 Running tests"

        CMD_TEST="pnpm --filter ${{ inputs.workspace_name }} test:all"

        npx start-server-and-test \
          "${{ inputs.cmd_start }}" \
          "${{ inputs.healthcheck }}" \
          "$CMD_TEST"

        echo "::endgroup::"
