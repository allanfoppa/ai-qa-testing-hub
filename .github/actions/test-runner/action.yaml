name: "Test Runner"
description: "Executes standard tests using start-server-and-test"
inputs:
  target_id:
    required: true
  root_path:
    required: false
    default: "."
  start_command:
    required: true
  wait_condition:
    required: true
  workspace_name:
    required: true
  port:
    required: false
    default: "3000"
runs:
  using: "composite"
  steps:
    - name: Execution
      shell: bash
      run: |
        set -euo pipefail

        export NODE_OPTIONS="--openssl-legacy-provider"
        export SKIP_PREFLIGHT_CHECK=true
        export PORT="${{ inputs.port }}"

        SAFE_ROOT_PATH="${{ inputs.root_path }}"
        if [ -z "$SAFE_ROOT_PATH" ] || [ "$SAFE_ROOT_PATH" = "null" ]; then
          SAFE_ROOT_PATH="."
        fi

        cd "apps/${{ inputs.target_id }}/$SAFE_ROOT_PATH"

        echo "📁 Working dir: $(pwd)"
        ls -la

        # Detect package manager
        if [ -f "pnpm-lock.yaml" ]; then
          PM="pnpm"
        elif [ -f "yarn.lock" ]; then
          PM="yarn"
        else
          PM="npm"
        fi

        echo "🚀 Detected package manager: $PM"

        # 🚨 Prevent pnpm workspace pollution
        export PNPM_WORKSPACE_ROOT=.

        # Validate start script exists
        if ! node -e "const p=require('./package.json'); process.exit(p.scripts?.start ? 0 : 1)"; then
          echo "❌ No start script found in package.json"
          exit 1
        fi

        echo "⚡ Starting app and running tests..."

        # Build test command dynamically
        if [ "$PM" = "pnpm" ]; then
          TEST_CMD="pnpm --filter ${{ inputs.workspace_name }} test"
        elif [ "$PM" = "yarn" ]; then
          TEST_CMD="yarn workspace ${{ inputs.workspace_name }} test"
        else
          TEST_CMD="npm run test --workspace=${{ inputs.workspace_name }}"
        fi

        echo "🧪 Test command: $TEST_CMD"

        npx start-server-and-test \
          "${{ inputs.start_command }}" \
          "${{ inputs.wait_condition }}" \
          "$TEST_CMD"
