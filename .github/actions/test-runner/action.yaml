name: "Test Runner"
description: "Executes standard tests using start-server-and-test"
inputs:
  workspace_name:
    required: true
  start:
    required: true
  port:
    required: true
runs:
  using: "composite"
  steps:
    - name: Execution
      shell: bash
      run: |
        set -euo pipefail

        QA_START="${{ inputs.start }}"
        QA_PORT="${{ inputs.port }}"

        # Build wait condition automatically
        WAIT_URL="http://localhost:$QA_PORT"

        echo "⏳ Waiting for: $WAIT_URL"

        # Run tests from hub (suite)
        TEST_CMD="pnpm --filter ${{ inputs.workspace_name }} test:all"

        echo "🧪 Test command: $TEST_CMD"

        # Start app + run tests
        npx start-server-and-test \
          "$QA_START" \
          "$WAIT_URL" \
          "$TEST_CMD"
