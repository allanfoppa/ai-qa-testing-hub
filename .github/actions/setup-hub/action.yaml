name: "Setup QA Hub"
description: "Installs pnpm dependencies for the testing hub"
inputs:
  workspace_name:
    required: true
runs:
  using: "composite"
  steps:
    - name: Hub Setup
      shell: bash
      run: |
        set -euo pipefail

        WORKSPACE_NAME="${{ inputs.workspace_name }}"

        if [ -z "$WORKSPACE_NAME" ] || [ "$WORKSPACE_NAME" = "null" ]; then
          echo "📦 Installing root workspace only"
          pnpm install --filter . --no-frozen-lockfile
        else
          echo "📦 Installing root + workspace: $WORKSPACE_NAME"
          pnpm install --filter . --filter "$WORKSPACE_NAME" --no-frozen-lockfile
        fi
