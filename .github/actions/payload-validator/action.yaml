name: "Payload Validator"
description: "Validates the payload"
inputs:
  qa_contract:
    required: true
  repo:
    required: true
  app_root:
    required: true
  server_port:
    required: true
  healthcheck:
    required: true

outputs:
  repo:
    value: ${{ steps.validate.outputs.repo }}
  app_root:
    value: ${{ steps.validate.outputs.app_root }}
  healthcheck:
    value: ${{ steps.validate.outputs.healthcheck }}
  server_port:
    value: ${{ steps.validate.outputs.server_port }}

runs:
  using: "composite"
  steps:
    - name: Validate Payload
      id: validate
      shell: bash
      run: |
        set -euo pipefail

        echo "🔍 Validating QA Contract..."

        QA_CONTRACT="${{ inputs.qa_contract }}"
        REPO="${{ inputs.repo }}"
        APP_ROOT="${{ inputs.app_root }}"
        SERVER_PORT="${{ inputs.server_port }}"
        HEALTHCHECK="${{ inputs.healthcheck }}"

        # --- VALIDATIONS ---

        [ "$QA_CONTRACT" != "v1" ] && echo "❌ Unsupported qaContract: $QA_CONTRACT" && exit 1
        [ -z "$REPO" ] && echo "❌ repo is required" && exit 1
        [ -z "$APP_ROOT" ] && echo "❌ app.root is required" && exit 1

        if ! [[ "$SERVER_PORT" =~ ^[0-9]+$ ]]; then
          echo "❌ server.port must be a number"
          exit 1
        fi

        if ! [[ "$HEALTHCHECK" =~ ^http ]]; then
          echo "❌ healthcheck must be a valid URL"
          exit 1
        fi

        # --- OUTPUTS ---

        echo "repo=$REPO" >> $GITHUB_OUTPUT
        echo "app_root=$APP_ROOT" >> $GITHUB_OUTPUT

        {
          echo "server_port<<EOF"
          echo "$SERVER_PORT"
          echo "EOF"

          echo "healthcheck<<EOF"
          echo "$HEALTHCHECK"
          echo "EOF"
        } >> $GITHUB_OUTPUT

        echo "::group::📦 Payload Summary"
        echo "repo=$REPO"
        echo "app_root=$APP_ROOT"
        echo "port=$SERVER_PORT"
        echo "::endgroup::"

        echo "✅ QA Contract is valid"
