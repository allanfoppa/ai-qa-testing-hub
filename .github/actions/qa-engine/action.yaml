name: "QA Engine"
description: "Handles payload-driven build and test lifecycle without eval"
inputs:
  project_id:
    required: true
  pat_token:
    required: true

runs:
  using: "composite"
  steps:
    - name: Clone and Execute
      shell: bash
      env:
        # Map all your payload variables...
        REPO: ${{ github.event.client_payload.repo }}
        TARGET_ID: ${{ github.event.client_payload.project_id }}
        ROOT_PATH: ${{ github.event.client_payload.root_path }}
        WORKSPACE: ${{ github.event.client_payload.workspace_name }}
        PORT: ${{ github.event.client_payload.port }}
        BUILD_SCRIPT: ${{ github.event.client_payload.build_script }}
        START_CMD: ${{ github.event.client_payload.start_command }}
        WAIT_ON: ${{ github.event.client_payload.wait_condition }}
        INTERNAL_PAT: ${{ inputs.pat_token }}
      run: |
        # 1. Force environment variables for legacy projects
        export NODE_OPTIONS="--openssl-legacy-provider"
        export SKIP_PREFLIGHT_CHECK=true
        export PORT=${PORT:-3000}

        SAFE_ROOT_PATH=${ROOT_PATH:-"."}

        # 2. Hub Setup
        pnpm install --filter . --filter "$WORKSPACE" --no-frozen-lockfile

        # 3. Clone
        GH_TOKEN=$INTERNAL_PAT gh repo clone "$REPO" "apps/$TARGET_ID"
        cd "apps/$TARGET_ID/$SAFE_ROOT_PATH"

        # 4. App Install
        pnpm install --no-frozen-lockfile --ignore-workspace

        # 5. Build (Now safe from OpenSSL and CRA preflight errors)
        if [ -n "$BUILD_SCRIPT" ] && [ "$BUILD_SCRIPT" != "null" ]; then
          echo "🏗️ Running Build Script: $BUILD_SCRIPT"
          pnpm --ignore-workspace run "$BUILD_SCRIPT"
        fi

        # 6. Execution
        echo "⚡ Starting App and Running Tests..."
        npx start-server-and-test \
          "$START_CMD" \
          "$WAIT_ON" \
          "pnpm --filter $WORKSPACE test"
